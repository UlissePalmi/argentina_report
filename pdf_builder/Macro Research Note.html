<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Macro Research Note — H&amp;R</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,500;0,8..60,600;0,8..60,700;0,8..60,900;1,8..60,400;1,8..60,500;1,8..60,700;1,8..60,900&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />

  <style>
    /* Dark backstage so the paper sheet pops */
    html, body { background: #1a1714; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .stage {
      padding: 32px 24px 80px;
      width: 100%;
      max-width: 944px;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .sheet {
      width: 880px;
      max-width: 100%;
      min-height: 1380px;
      box-shadow:
        0 1px 0 rgba(0,0,0,0.3),
        0 18px 40px -8px rgba(0,0,0,0.55),
        0 60px 80px -20px rgba(0,0,0,0.45);
      /* Faint paper edge */
      border: 1px solid #2a2722;
      background: #f4f0e6;
    }

    .stage-foot {
      width: 880px;
      max-width: 100%;
      display: flex;
      justify-content: space-between;
      color: #6b625a;
      font-family: "IBM Plex Mono", monospace;
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding-top: 6px;
    }
    .stage-foot span { opacity: 0.7; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="charts.jsx"></script>
  <script type="text/babel" src="sample-data.jsx"></script>
  <script type="text/babel" src="variation-a.jsx"></script>
  <script type="text/babel" src="research-note-app.jsx"></script>
</body>
</html>
