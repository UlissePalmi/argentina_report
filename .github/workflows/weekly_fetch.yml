name: Weekly data fetch

on:
  schedule:
    - cron: "0 10 * * 6"  # Every Saturday 10:00 UTC (BCRA publishes Thursday/Friday)
  workflow_dispatch:        # Allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync

      - name: Fetch data
        run: uv run python main.py --data-only

      - name: Commit new data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet && echo "No new data" || git commit -m "Weekly data fetch $(date -u +%Y-%m-%d)"
          git push
